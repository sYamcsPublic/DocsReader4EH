<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, shrink-to-fit=no, user-scalable=no">
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" href="/icon-any.png" />
  <link rel="apple-touch-icon" href="/icon-maskable.png" />
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self'; 
    script-src 'self'
      'unsafe-inline'
      https://accounts.google.com/gsi/client
      https://syamcspublic.github.io;
    connect-src 'self' 
      ipc.localhost 
      tauri://localhost 
      http://ipc.localhost 
      https://accounts.google.com 
      https://www.googleapis.com 
      https://oauth2.googleapis.com 
      https://syamcspublic.github.io
      https://api.github.com
      https://raw.githubusercontent.com; 
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; 
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' data: https://lh3.googleusercontent.com;
    object-src 'none'; 
    base-uri 'self';
  ">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script defer src="https://syamcspublic.github.io/ConsoleJS/Console.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
    window.addEventListener("DOMContentLoaded", async () => {
      await Console.promise;
      await Console.settings({
        storage: false,
        show: false,
        pos: "right-bottom",
        posx: 65,
        posy: 65,
      })
      console.log(`[index.html]version:0.2.15`);
      console.log(`[index.html]location.href:${location.href}`);
    })
  </script>
  <title>Docs Reader for EvenHub</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
